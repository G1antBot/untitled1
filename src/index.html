<!doctype html>
<html class="no-js" lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外科学总论复习</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="外科学总论复习题库，支持单选、多选、名词解释与问答题。">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/ico剪切板n.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <div class="page">
    <header class="hero">
      <div class="brand">外科学总论复习</div>
      <div class="subtitle">随机抽题（固定版） · 即时反馈 · 总分 100</div>
    </header>

    <nav class="tabs">
      <button class="tab-button" data-tab="single">单选 50</button>
      <button class="tab-button" data-tab="multiple">多选 5</button>
      <button class="tab-button" data-tab="term">名词解释 10</button>
      <button class="tab-button" data-tab="short">问答 3</button>
    </nav>

    <main class="content">
      <section class="tab-panel" data-type="single" data-title="单选题"></section>
      <section class="tab-panel" data-type="multiple" data-title="多选题"></section>
      <section class="tab-panel" data-type="term" data-title="名词解释"></section>
      <section class="tab-panel" data-type="short" data-title="问答题"></section>
    </main>

    <footer class="actions">
      <div class="score">当前得分：<span id="score-value">0</span> / 100</div>
      <div class="buttons">
        <button id="check-answers" class="primary">提交并查看答案</button>
        <button id="reset-answers" class="ghost">清空作答</button>
      </div>
    </footer>
  </div>
  <script src="js/app.js"></script>

</body>

</html>
