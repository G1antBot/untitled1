<!doctype html>
<html class="no-js" lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外科学总论复习</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="外科学总论复习题库，支持单选、多选、名词解释与问答题。">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/ico剪切板n.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <div class="page">
    <header class="hero">
      <div class="brand" id="brand-text">外科学总论复习</div>
      <div class="subtitle" id="subtitle-text">随机抽题（固定版） · 即时反馈 · 总分 100</div>
      <div class="subject-select">
        <label for="subject-select">选择学科</label>
        <select id="subject-select">
          <option value="surgery">外科学总论</option>
          <option value="diagnostics">诊断学（简答+论述）</option>
          <option value="ebm">循证医学</option>
        </select>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-button" data-tab="single">单选 50</button>
      <button class="tab-button" data-tab="multiple">多选 5</button>
      <button class="tab-button" data-tab="term">名词解释 10</button>
      <button class="tab-button" data-tab="short">问答 3</button>
      <button class="tab-button" data-tab="judge">判断题 5</button>
    </nav>

    <main class="content">
      <section class="tab-panel" data-type="single" data-title="单选题"></section>
      <section class="tab-panel" data-type="multiple" data-title="多选题"></section>
      <section class="tab-panel" data-type="term" data-title="名词解释"></section>
      <section class="tab-panel" data-type="short" data-title="问答题"></section>
      <section class="tab-panel" data-type="judge" data-title="判断题"></section>
    </main>

    <footer class="actions">
      <div class="score">
        <div class="score-total">总分：<span id="score-total">0</span> / <span id="score-total-max">100</span></div>
        <div class="score-breakdown">
          <span class="score-item" id="score-item-single"><span id="score-label-single">单选</span> <span id="score-single">0</span> / <span id="score-single-max">0</span></span>
          <span class="score-item" id="score-item-multiple"><span id="score-label-multiple">多选</span> <span id="score-multiple">0</span> / <span id="score-multiple-max">0</span></span>
          <span class="score-item" id="score-item-term"><span id="score-label-term">名词解释</span> <span id="score-term">0</span> / <span id="score-term-max">0</span></span>
          <span class="score-item" id="score-item-short"><span id="score-label-short">问答</span> <span id="score-short">0</span> / <span id="score-short-max">0</span></span>
          <span class="score-item" id="score-item-judge"><span id="score-label-judge">判断</span> <span id="score-judge">0</span> / <span id="score-judge-max">0</span></span>
        </div>
      </div>
      <div class="buttons">
        <button id="check-answers" class="primary">提交并查看答案</button>
        <button id="reset-answers" class="ghost">清空作答</button>
        <button id="shuffle-questions" class="ghost">换一批</button>
      </div>
    </footer>
  </div>
  <script src="js/app.js"></script>

</body>

</html>
